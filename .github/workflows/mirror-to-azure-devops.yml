name: Mirror to Azure DevOps

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for --mirror

      - name: Push mirror to Azure DevOps
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_REPO_URL: ${{ secrets.ADO_REPO_URL }}
        run: |
          git push https://:$ADO_PAT@${ADO_REPO_URL#https://} --mirror
