name: Mirror to Azure DevOps

on:
  push:
    branches:
      - '**'
  create:
  delete:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to Azure DevOps
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_REPO_URL: ${{ secrets.ADO_REPO_URL }}
        run: |
          CLEAN_URL="${ADO_REPO_URL%/}"
          CLEAN_URL="${CLEAN_URL#https://}"
          CLEAN_URL="${CLEAN_URL#*@}"
          git remote add ado "https://x:${ADO_PAT}@${CLEAN_URL}"
          git fetch --prune origin
          git push --prune ado refs/remotes/origin/*:refs/heads/*
          git push --tags ado
