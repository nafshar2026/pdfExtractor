name: Mirror to Azure DevOps

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for --mirror

      - name: Push mirror to Azure DevOps
        env:
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_REPO_URL: ${{ secrets.ADO_REPO_URL }}
        run: |
          CLEAN_URL="${ADO_REPO_URL%/}"
          CLEAN_URL="${CLEAN_URL#https://}"
          echo "CLEAN_URL length: ${#CLEAN_URL}"
          echo "CLEAN_URL hostname: $(echo "$CLEAN_URL" | cut -d'/' -f1)"
          git push "https://x:${ADO_PAT}@${CLEAN_URL}" --mirror
